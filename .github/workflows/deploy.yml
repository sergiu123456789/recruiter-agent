name: Ultra-fast CI/CD to Cloud Run

on:
  push:
    branches:
      - master
      - main
  workflow_dispatch:

env:
  SERVICE: recruiter-agent
  REGION: us-central1

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run evaluation harness (quality gate)
        env:
          GOOGLE_API_KEY: ${{ secrets.GOOGLE_API_KEY }}
        run: |
          python app/eval_agent.py

      - name: Enforce minimum evaluation score
        run: |
          python - << 'EOF'
          import json, os
          path = "eval_results.json"
          if not os.path.exists(path):
              raise SystemExit("❌ No eval_results.json — eval must produce this file")
          data = json.load(open(path))
          score = data.get("average_score", 0)
          print(f"Average Score = {score}")
          if score < 4.0:
              raise SystemExit("❌ Eval score < 4.0 — blocking deployment")
          print("✔ Eval gate passed")
          EOF

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Set gcloud project
        run: gcloud config set project ${{ secrets.GCP_PROJECT }}

      - name: Use Kaniko layer caching
        run: |
          gcloud config set builds/use_kaniko True
          gcloud config set builds/kaniko_cache_ttl 24h

      - name: Deploy using Cloud Buildpacks with caching (fastest)
        run: |
          gcloud run deploy $SERVICE \
            --source . \
            --region $REGION \
            --allow-unauthenticated \
            --build-cache \
            --quiet
